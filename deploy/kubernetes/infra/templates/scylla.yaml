---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: posts-db-data
spec:
  accessModes: [ReadWriteOnce]
  resources:
    requests:
      storage: {{ .Values.scylla.storage }}
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: posts-db
  labels:
    app: posts-db
spec:
  replicas: 1
  selector:
    matchLabels:
      app: posts-db
  template:
    metadata:
      labels:
        app: posts-db
    spec:
      containers:
        - name: posts-db
          image: {{ .Values.scylla.image }}
          args: [--smp, "1", --memory, 512M, --overprovisioned, "1"]
          ports:
            - containerPort: 9042
          volumeMounts:
            - name: data
              mountPath: /var/lib/scylla
          readinessProbe:
            exec:
              command: [nodetool, status]
            initialDelaySeconds: 30
            periodSeconds: 10
            failureThreshold: 12
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: posts-db-data
---
apiVersion: v1
kind: Service
metadata:
  name: posts-db
spec:
  selector:
    app: posts-db
  ports:
    - port: 9042
      targetPort: 9042
  type: ClusterIP
