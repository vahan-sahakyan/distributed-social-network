replicaCount: 1

image:
  tag: latest
  pullPolicy: IfNotPresent

services:
  gateway:
    port: 8080
  posts:
    port: 8081
  feed:
    port: 8082
  comments:
    port: 8083
  likes:
    port: 8084
  users:
    port: 8085
  media:
    port: 8086
  notifications:
    port: 8087
  event-writer:
    port: 8088
  cache-rebuilder:
    port: 8089

postgres:
  user: postgres
  password: postgres

memcached:
  addr: memcached:11211

kafka:
  brokers: redpanda:9092

scylla:
  hosts: posts-db:9042
  keyspace: posts

clickhouse:
  addr: clickhouse:9000
  database: default

minio:
  endpoint: minio:9000
  accessKey: minioadmin
  secretKey: minioadmin
  bucket: images
